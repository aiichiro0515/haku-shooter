<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>はくちゃんシューター</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a0a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: white;
      touch-action: none;
      overflow: hidden;
    }
    canvas {
      border: 2px solid #ff9ec8;
      border-radius: 8px;
      box-shadow: 0 0 30px #ff69b488;
      max-width: 100%;
      max-height: 90vh;
      touch-action: none;
    }
    #ui {
      display: flex;
      gap: 40px;
      margin-bottom: 8px;
      font-size: 18px;
    }
    #ui span { color: #ffb3d9; }
    #controls {
      margin-top: 8px;
      font-size: 13px;
      color: #9977aa;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div>スコア: <span id="score">0</span></div>
    <div>レベル: <span id="level">1</span></div>
    <div>❤️ <span id="lives">3</span></div>
  </div>
  <canvas id="game" width="400" height="600"></canvas>
  <div id="controls" id="controls">← → 移動 | スペース: 発射</div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const controlsEl = document.getElementById('controls');

    const W = canvas.width;
    const H = canvas.height;

    // はくちゃん画像の読み込み
    const hakuImg = new Image();
    hakuImg.src = 'haku.jpg';
    let imgLoaded = false;
    hakuImg.onload = () => { imgLoaded = true; };

    // タッチ操作の検出
    const isMobile = ('ontouchstart' in window);
    if (isMobile) controlsEl.textContent = '指でなぞって移動 | 自動連射';

    // ゲーム状態
    let state = 'title';
    let score = 0;
    let lives = 3;
    let level = 1;
    let frame = 0;
    let enemySpawnRate = 80;
    let hiScore = 0;

    // 星背景
    const stars = Array.from({ length: 80 }, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.5 + 0.3,
      speed: Math.random() * 0.5 + 0.2,
      brightness: Math.random()
    }));

    // はくちゃん
    const player = {
      x: W / 2,
      y: H - 80,
      w: 44,
      h: 50,
      speed: 4,
      shotCooldown: 0,
      invincible: 0,
      dx: 0
    };

    let bullets = [];
    let enemies = [];
    let particles = [];
    let keys = {};
    let touchX = null; // タッチ中の指のX座標（canvas座標系）

    // タッチのcanvas座標変換
    function getTouchCanvasX(touch) {
      const rect = canvas.getBoundingClientRect();
      return (touch.clientX - rect.left) * (W / rect.width);
    }

    // タッチイベント
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      if (state === 'title' || state === 'over') { startGame(); return; }
      touchX = getTouchCanvasX(e.touches[0]);
    }, { passive: false });

    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      if (state === 'play') touchX = getTouchCanvasX(e.touches[0]);
    }, { passive: false });

    canvas.addEventListener('touchend', e => {
      e.preventDefault();
      touchX = null;
    }, { passive: false });

    // キーボードイベント
    document.addEventListener('keydown', e => {
      keys[e.code] = true;
      if (e.code === 'Space') {
        e.preventDefault();
        if (state === 'title' || state === 'over') startGame();
        else shoot();
      }
    });
    document.addEventListener('keyup', e => keys[e.code] = false);
    canvas.addEventListener('click', () => {
      if (state === 'title' || state === 'over') startGame();
    });

    function startGame() {
      state = 'play';
      score = 0;
      lives = 3;
      level = 1;
      frame = 0;
      enemySpawnRate = 80;
      bullets = [];
      enemies = [];
      particles = [];
      player.x = W / 2;
      player.y = H - 80;
      player.invincible = 0;
      touchX = null;
      updateUI();
    }

    function shoot() {
      if (player.shotCooldown > 0) return;
      bullets.push({ x: player.x, y: player.y - player.h / 2, w: 4, h: 12, speed: 10 });
      player.shotCooldown = 12;
    }

    // はくちゃんを描く（写真 + アニメーション）
    function drawPlayer(x, y, invincible) {
      if (invincible > 0 && Math.floor(invincible / 4) % 2 === 0) return;

      const bob = Math.sin(frame * 0.08) * 4;          // ふわふわ上下
      const sway = Math.sin(frame * 0.05) * 0.06;      // ゆらゆら回転
      const scale = 1 + Math.sin(frame * 0.12) * 0.04; // 呼吸スケール
      const imgW = 72;
      const imgH = 72;

      ctx.save();
      ctx.translate(x, y + bob);
      ctx.rotate(sway);
      ctx.scale(scale, scale);

      if (imgLoaded) {
        // 丸くクリップして写真を表示
        ctx.beginPath();
        ctx.arc(0, 0, imgW / 2, 0, Math.PI * 2);
        ctx.clip();
        ctx.drawImage(hakuImg, -imgW / 2, -imgH / 2, imgW, imgH);

        // 無敵時にピンクのオーバーレイ
        if (invincible > 0) {
          ctx.globalAlpha = 0.3;
          ctx.fillStyle = '#ff69b4';
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      } else {
        // 画像読み込み前のフォールバック
        ctx.fillStyle = '#f5f5f5';
        ctx.beginPath();
        ctx.arc(0, 0, imgW / 2, 0, Math.PI * 2);
        ctx.fill();
      }

      // ピンクのグロー枠
      ctx.restore();
      ctx.save();
      ctx.translate(x, y + bob);
      ctx.rotate(sway);
      ctx.scale(scale, scale);
      ctx.strokeStyle = invincible > 0 ? '#ff0066' : '#ff9ec8';
      ctx.lineWidth = 3;
      ctx.shadowColor = '#ff69b4';
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.arc(0, 0, imgW / 2, 0, Math.PI * 2);
      ctx.stroke();

      ctx.restore();
    }

    // 敵（ネズミ）
    function drawEnemy(e) {
      ctx.save();
      ctx.translate(e.x, e.y);

      ctx.fillStyle = e.color || '#888';
      ctx.beginPath();
      ctx.ellipse(0, 0, e.w / 2, e.h / 2, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#aaa';
      ctx.beginPath(); ctx.arc(-6, -10, 6, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(6, -10, 6, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#ffcccc';
      ctx.beginPath(); ctx.arc(-6, -10, 3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(6, -10, 3, 0, Math.PI * 2); ctx.fill();

      ctx.fillStyle = '#f00';
      ctx.beginPath(); ctx.arc(-5, -2, 3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(5, -2, 3, 0, Math.PI * 2); ctx.fill();

      ctx.strokeStyle = '#666';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(12, 4);
      ctx.quadraticCurveTo(24, 0, 20, -10);
      ctx.stroke();

      ctx.restore();
    }

    // 弾
    function drawBullet(b) {
      ctx.save();
      ctx.translate(b.x, b.y);
      const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, b.w * 3);
      grad.addColorStop(0, '#fff');
      grad.addColorStop(0.4, '#ff9ec8');
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(0, 0, b.w * 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.ellipse(0, 0, b.w, b.h, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function spawnParticles(x, y, color) {
      for (let i = 0; i < 14; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 4 + 1;
        particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 1, color, r: Math.random() * 5 + 2 });
      }
    }

    function updateUI() {
      document.getElementById('score').textContent = score;
      document.getElementById('level').textContent = level;
      document.getElementById('lives').textContent = lives;
    }

    function circle(ax, ay, ar, bx, by, br) {
      const dx = ax - bx, dy = ay - by;
      return Math.sqrt(dx * dx + dy * dy) < ar + br;
    }

    function update() {
      frame++;

      // キーボード移動
      if (keys['ArrowLeft'] || keys['KeyA']) player.x -= player.speed;
      if (keys['ArrowRight'] || keys['KeyD']) player.x += player.speed;

      // タッチ移動（指の位置に向かってスムーズに近づく）
      if (touchX !== null) {
        const dx = touchX - player.x;
        player.x += dx * 0.18;
      }

      player.x = Math.max(player.w / 2, Math.min(W - player.w / 2, player.x));
      if (player.shotCooldown > 0) player.shotCooldown--;
      if (player.invincible > 0) player.invincible--;

      // 射撃（スペース長押し or タッチ中は自動連射）
      if (keys['Space'] || touchX !== null || isMobile) shoot();

      // 弾更新
      bullets = bullets.filter(b => { b.y -= b.speed; return b.y > -20; });

      // 敵スポーン
      if (frame % enemySpawnRate === 0) {
        const types = [
          { w: 28, h: 22, hp: 1, speed: 1.2 + level * 0.3, score: 10, color: '#999' },
          { w: 36, h: 28, hp: 2, speed: 0.8 + level * 0.2, score: 20, color: '#778' },
          { w: 22, h: 18, hp: 1, speed: 2.0 + level * 0.4, score: 15, color: '#a85' },
        ];
        const t = types[Math.floor(Math.random() * types.length)];
        enemies.push({
          x: Math.random() * (W - 60) + 30, y: -20,
          w: t.w, h: t.h, hp: t.hp, maxHp: t.hp,
          speed: t.speed, score: t.score, color: t.color,
          dx: (Math.random() - 0.5) * 1.5
        });
      }

      // 敵更新
      enemies = enemies.filter(e => {
        e.y += e.speed;
        e.x += e.dx;
        if (e.x < 20 || e.x > W - 20) e.dx *= -1;

        bullets = bullets.filter(b => {
          if (circle(b.x, b.y, 6, e.x, e.y, e.w / 2)) {
            e.hp--;
            spawnParticles(b.x, b.y, '#ffaacc');
            return false;
          }
          return true;
        });

        if (e.hp <= 0) {
          score += e.score;
          spawnParticles(e.x, e.y, e.color);
          updateUI();
          return false;
        }

        if (player.invincible === 0 && circle(e.x, e.y, e.w / 2, player.x, player.y, 18)) {
          lives--;
          player.invincible = 120;
          spawnParticles(player.x, player.y, '#ff6699');
          updateUI();
          if (lives <= 0) { hiScore = Math.max(hiScore, score); state = 'over'; }
          return false;
        }

        return e.y < H + 30;
      });

      particles = particles.filter(p => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.03;
        return p.life > 0;
      });

      const newLevel = Math.floor(score / 200) + 1;
      if (newLevel !== level) {
        level = newLevel;
        enemySpawnRate = Math.max(25, 80 - level * 8);
        updateUI();
      }

      stars.forEach(s => {
        s.y += s.speed;
        if (s.y > H) s.y = 0;
        s.brightness = 0.3 + 0.7 * Math.abs(Math.sin(frame * 0.02 + s.x));
      });
    }

    function draw() {
      ctx.fillStyle = '#1a0a2e';
      ctx.fillRect(0, 0, W, H);

      stars.forEach(s => {
        ctx.globalAlpha = s.brightness;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;

      if (state === 'title') { drawTitle(); return; }
      if (state === 'over') { drawGameOver(); return; }

      particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;

      enemies.forEach(e => {
        drawEnemy(e);
        if (e.maxHp > 1) {
          ctx.fillStyle = '#500';
          ctx.fillRect(e.x - 16, e.y + e.h / 2 + 4, 32, 4);
          ctx.fillStyle = '#f55';
          ctx.fillRect(e.x - 16, e.y + e.h / 2 + 4, 32 * (e.hp / e.maxHp), 4);
        }
      });

      bullets.forEach(b => drawBullet(b));
      drawPlayer(player.x, player.y, player.invincible);
    }

    function drawTitle() {
      ctx.globalAlpha = 1;
      ctx.textAlign = 'center';
      ctx.fillStyle = '#ff9ec8';
      ctx.font = 'bold 34px sans-serif';
      ctx.fillText('🐱 はくちゃんシューター', W / 2, 140);

      ctx.fillStyle = '#ffccee';
      ctx.font = '18px sans-serif';
      ctx.fillText('ネズミをやっつけよう！', W / 2, 180);

      drawPlayer(W / 2, 300, 0);

      ctx.fillStyle = '#aaddff';
      ctx.font = '16px sans-serif';
      ctx.fillText(isMobile ? 'タップしてスタート' : 'スペース / クリックでスタート', W / 2, 430);

      ctx.fillStyle = '#9977aa';
      ctx.font = '13px sans-serif';
      ctx.fillText(isMobile ? '指でなぞって移動・自動連射' : '← → 移動 | スペース長押しで連射', W / 2, 460);

      if (hiScore > 0) {
        ctx.fillStyle = '#ffdd88';
        ctx.font = '15px sans-serif';
        ctx.fillText(`ハイスコア: ${hiScore}`, W / 2, 500);
      }
    }

    function drawGameOver() {
      ctx.globalAlpha = 0.7;
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);
      ctx.globalAlpha = 1;

      ctx.textAlign = 'center';
      ctx.fillStyle = '#ff6699';
      ctx.font = 'bold 40px sans-serif';
      ctx.fillText('GAME OVER', W / 2, 200);

      ctx.fillStyle = '#ffccee';
      ctx.font = '24px sans-serif';
      ctx.fillText(`スコア: ${score}`, W / 2, 260);

      ctx.fillStyle = '#ffdd88';
      ctx.font = '20px sans-serif';
      ctx.fillText(`ハイスコア: ${hiScore}`, W / 2, 300);

      ctx.fillStyle = '#aaddff';
      ctx.font = '16px sans-serif';
      ctx.fillText(isMobile ? 'タップでリトライ' : 'スペース / クリックでリトライ', W / 2, 370);

      ctx.save();
      ctx.translate(W / 2, 460);
      drawPlayer(0, 0, 0);
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(-7, -26, 3, Math.PI * 0.2, Math.PI * 0.8); ctx.stroke();
      ctx.beginPath(); ctx.arc(7, -26, 3, Math.PI * 0.2, Math.PI * 0.8); ctx.stroke();
      ctx.restore();
    }

    function loop() {
      if (state === 'play') update();
      draw();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
